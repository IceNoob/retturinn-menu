<!DOCTYPE html>
<html lang="is">
<head>
<meta charset="UTF-8">
<style>
@font-face { font-family:'Montserrat'; font-weight:500; src:url('/fonts/Montserrat-500.ttf') format('truetype'); }
@font-face { font-family:'Montserrat'; font-weight:600; src:url('/fonts/Montserrat-600.ttf') format('truetype'); }
@font-face { font-family:'Montserrat'; font-weight:700; src:url('/fonts/Montserrat-700.ttf') format('truetype'); }
@font-face { font-family:'Montserrat'; font-weight:800; src:url('/fonts/Montserrat-800.ttf') format('truetype'); }
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#fff;}
body{font-family:'Montserrat',sans-serif;}
.frame{position:absolute;top:0;left:0;width:1344px;height:950px;overflow:hidden;transform-origin:top left;}

.bg-orange{position:absolute;left:0;top:0;width:1344px;height:783px;background:#F9890C;}

.soup-box{position:absolute;left:833px;top:0;width:511px;height:206px;background:#FFC300;}
.soup-label{position:absolute;left:918px;top:39px;color:#000;font-weight:800;font-size:48px;line-height:1em;white-space:nowrap;}
.soup-text{position:absolute;left:833px;top:102px;width:511px;height:83px;color:#000;font-weight:700;font-size:36px;line-height:1.111em;text-align:center;padding:0 12px;overflow:hidden;}

.day-header{position:absolute;left:35px;top:29px;color:#fff;font-weight:800;font-size:60px;line-height:1.219em;white-space:nowrap;}

.dish1-prefix{display:none;position:absolute;left:58px;top:110px;width:760px;color:rgba(255,255,255,0.85);font-weight:600;font-size:28px;font-style:italic;line-height:1em;}
.dish1-title{position:absolute;left:58px;top:135px;width:760px;color:#fff;font-weight:800;font-size:48px;line-height:1em;overflow:hidden;white-space:nowrap;}
.dish1-desc{position:absolute;left:87px;top:190px;width:720px;color:#fff;font-weight:500;font-size:30px;line-height:1.333em;overflow:hidden;}
.dish2-prefix{display:none;position:absolute;left:58px;top:256px;width:760px;color:rgba(255,255,255,0.85);font-weight:600;font-size:28px;font-style:italic;line-height:1em;}
.dish2-title{position:absolute;left:58px;top:281px;width:760px;color:#fff;font-weight:800;font-size:48px;line-height:1em;overflow:hidden;white-space:nowrap;}
.dish2-desc{position:absolute;left:87px;top:336px;width:720px;color:#fff;font-weight:500;font-size:30px;line-height:1.333em;overflow:hidden;}

.dish3-wrap{display:none;position:absolute;left:0;top:400px;width:820px;}
.dish3-wrap.visible{display:block;}
.dish3-title{position:absolute;left:58px;top:0;width:760px;color:#fff;font-weight:800;font-size:40px;line-height:1em;overflow:hidden;white-space:nowrap;}
.dish3-desc{position:absolute;left:87px;top:48px;width:720px;color:#fff;font-weight:500;font-size:26px;line-height:1.333em;overflow:hidden;}

.salad-box{position:absolute;left:833px;top:253px;width:511px;height:236px;background:#FFEA00;box-shadow:8px 10px 4px 0 rgba(0,0,0,.15);}
.salad-text{position:absolute;left:852px;top:272px;width:474px;height:199px;color:#000;font-size:28px;line-height:1.219em;overflow:hidden;font-weight:500;}
.salad-text .salad-title{font-weight:700;}

.vegan-band{position:absolute;left:0;top:528px;width:1073px;height:182px;background:rgba(255,255,255,.25);}
.chef-img{position:absolute;left:-42px;top:537px;width:286px;height:165px;object-fit:cover;}
.vegan-title{position:absolute;left:234px;top:574px;width:800px;color:#fff;font-weight:800;font-size:48px;line-height:1em;overflow:hidden;white-space:nowrap;}
.vegan-desc{position:absolute;left:260px;top:630px;width:800px;color:#fff;font-weight:500;font-size:30px;line-height:1.333em;overflow:hidden;}

.logo-img{position:absolute;left:984px;top:577px;width:382px;height:382px;object-fit:contain;}

.fastir-label{position:absolute;left:58px;top:793px;color:#F9890C;font-weight:700;font-size:60px;line-height:1.219em;white-space:nowrap;}
.fastir-text{position:absolute;left:58px;top:860px;width:852px;color:#F9890C;font-weight:500;font-size:30px;line-height:1.333em;overflow:hidden;}
</style>
</head>
<body>
<div class="frame">
  <div class="bg-orange"></div>

  <div class="soup-box"></div>
  <div class="soup-label">Súpa dagsins</div>
  <div class="soup-text" id="soup"></div>

  <div class="day-header" id="day-date"></div>

  <div class="dish1-prefix" id="dish1-prefix"></div>
  <div class="dish1-title" id="dish1-title"></div>
  <div class="dish1-desc" id="dish1-desc"></div>

  <div class="dish2-prefix" id="dish2-prefix"></div>
  <div class="dish2-title" id="dish2-title"></div>
  <div class="dish2-desc" id="dish2-desc"></div>

  <div class="dish3-wrap" id="dish3-wrap">
    <div class="dish3-title" id="dish3-title"></div>
    <div class="dish3-desc" id="dish3-desc"></div>
  </div>

  <div class="salad-box"></div>
  <div class="salad-text"><span class="salad-title" id="salad-title"></span><span id="salad-body"></span></div>

  <div class="vegan-band"></div>
  <img class="chef-img" src="/chef.png" />
  <div class="vegan-title" id="vegan-title"></div>
  <div class="vegan-desc" id="vegan-desc"></div>

  <img class="logo-img" src="/logo.png" />

  <div class="fastir-label">Fastir réttir</div>
  <div class="fastir-text" id="fixed-dishes"></div>
</div>
<script>
const DAYS = ['manudagur','thridjudagur','midvikudagur','fimmtudagur','fostudagur'];
const MONTHS = ['janúar','febrúar','mars','apríl','maí','júní','júlí','ágúst','september','október','nóvember','desember'];

function formatDate(d) {
  if (!d) return '';
  const [day, month] = d.split('/');
  return `${parseInt(day)}. ${MONTHS[parseInt(month) - 1]}`;
}

function splitDish(dish) {
  if (!dish) return { prefix: '', title: '', desc: '' };
  const clean = dish.replace(/[.,]\s*$/, '').trim();
  const qm = clean.match(/^(.{4,}?)\s*["“„]([^"“”„]+)["”„]\s*(.*)$/);
  if (qm) return { prefix: qm[1].trim(), title: qm[2].trim(), desc: qm[3].trim() };
  for (const sep of [' með ', ' ásamt ']) {
    const idx = clean.indexOf(sep);
    if (idx > 2) return { prefix: '', title: clean.substring(0, idx).trim(), desc: clean.substring(idx + 1).trim() };
  }
  const ci = clean.indexOf(', ');
  if (ci > 2) return { prefix: '', title: clean.substring(0, ci).trim(), desc: clean.substring(ci + 2).trim() };
  return { prefix: '', title: clean, desc: '' };
}

function ft(d) { return d.prefix ? `${d.prefix} ${d.title}` : d.title; }

function fitWidth(el, minPx) {
  if (!el) return;
  while (el.scrollWidth > el.clientWidth && parseFloat(getComputedStyle(el).fontSize) > minPx) {
    el.style.fontSize = (parseFloat(getComputedStyle(el).fontSize) - 1) + 'px';
  }
}

function scheduleRefreshAtMidnight() {
  const now = new Date();
  const midnight = new Date(now);
  midnight.setHours(24, 0, 0, 0);
  setTimeout(() => location.reload(), midnight - now);
}

function todaySlug() {
  const dow = new Date().getDay();
  return (dow >= 1 && dow <= 5) ? DAYS[dow - 1] : 'fostudagur';
}

function setText(id, val) {
  const el = document.getElementById(id);
  if (el) el.textContent = val || '';
}

function render(data) {
  const d1 = splitDish(data.dishes?.[0]);
  const d2 = splitDish(data.dishes?.[1]);
  const d3 = data.fridaySpecial ? splitDish(data.fridaySpecial) : null;
  const vegan = splitDish(data.vegan);
  const dateStr = formatDate(data.date);

  setText('day-date', `${data.day || ''}${dateStr ? '  ' + dateStr : ''}`);
  setText('soup', data.soup || '');
  setText('dish1-title', ft(d1));
  setText('dish1-desc', d1.desc);
  setText('dish2-title', ft(d2));
  setText('dish2-desc', d2.desc);

  if (d3) {
    document.getElementById('dish3-wrap').classList.add('visible');
    setText('dish3-title', ft(d3));
    setText('dish3-desc', d3.desc);
  }

  const saladParts = (data.saladOfTheWeek || '').split(': ');
  setText('salad-title', saladParts[0] + ': ');
  setText('salad-body', saladParts.slice(1).join(': '));

  setText('vegan-title', ft(vegan));
  setText('vegan-desc', vegan.desc);
  setText('fixed-dishes', data.fixedDishes || '');

  document.fonts.ready.then(() => {
    fitWidth(document.getElementById('dish1-title'), 24);
    fitWidth(document.getElementById('dish2-title'), 24);
    fitWidth(document.getElementById('dish3-title'), 24);
    fitWidth(document.getElementById('vegan-title'), 24);
  });
}

function scaleToFit() {
  const frame = document.querySelector('.frame');
  const scale = Math.min(window.innerWidth / 1344, window.innerHeight / 950);
  frame.style.transform = `scale(${scale})`;
  frame.style.left = ((window.innerWidth - 1344 * scale) / 2) + 'px';
  frame.style.top = ((window.innerHeight - 950 * scale) / 2) + 'px';
}
scaleToFit();
window.addEventListener('resize', scaleToFit);

async function init(retryDelay) {
  const slug = todaySlug();
  try {
    const res = await fetch('/api/menu');
    const menu = await res.json();
    const data = menu[slug] || menu['fostudagur'];
    if (data) {
      render(data);
      scheduleRefreshAtMidnight();
      return;
    }
  } catch (e) {
    console.error('Failed to fetch menu:', e);
  }
  const delay = Math.min(retryDelay || 15000, 300000);
  setTimeout(() => init(delay * 2), delay);
}

init();
</script>
</body>
</html>
